name: CI

on:
  push:
    branches: ["main"]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # stable: v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-preview*"  # preview: v1.2.3-preview1
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore specgen.slnx

      - name: Build
        run: dotnet build specgen.slnx --no-restore --no-incremental -c Release

      - name: Test
        run: dotnet test specgen.slnx --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  validate-gate:
    name: Validate Steering Docs
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build CLI
        run: dotnet build src/Steergen.Cli/Steergen.Cli.csproj --no-restore -c Release

      # Exit code contract: 0 = clean, 1 = validation errors, 2 = config/IO error
      - name: Validate steering documents
        run: |
          dotnet run --project src/Steergen.Cli --no-build -c Release -- \
            validate \
            --global tests/Fixtures/RealisticGovernance/global \
            --project tests/Fixtures/RealisticGovernance/project \
            --quiet
        # Exits 1 if any steering document has schema or rule errors; CI fails the PR.

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build CLI
        run: dotnet build src/Steergen.Cli/Steergen.Cli.csproj --no-restore -c Release

      - name: Verify tag matches stable or preview convention
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable release: $TAG"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-preview[0-9]+$ ]]; then
            echo "Preview release: $TAG"
          else
            echo "ERROR: Tag '$TAG' does not match stable (vX.Y.Z) or preview (vX.Y.Z-previewN) format."
            exit 1
          fi

      - name: Run generation and verify deterministic manifest
        run: |
          OUT=$(mktemp -d)
          MANIFEST="$OUT/generation-manifest.json"
          dotnet run --project src/Steergen.Cli --no-build -c Release -- \
            run \
            --global tests/Fixtures/RealisticGovernance/global \
            --project tests/Fixtures/RealisticGovernance/project \
            --output "$OUT" \
            --target speckit
          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: generation-manifest.json not produced"
            exit 1
          fi
          echo "Manifest produced:"
          cat "$MANIFEST"
          SUCCESS=$(jq -r '.success' "$MANIFEST")
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: generation manifest reports failure"
            exit 1
          fi

      # T075: Publish single portable executable (ReadyToRun, self-contained)
      - name: Publish portable executable (linux-x64)
        run: |
          dotnet publish src/Steergen.Cli/Steergen.Cli.csproj \
            -c Release \
            -r linux-x64 \
            -p:PublishPortable=true \
            --output publish/linux-x64

      # T076: Verify executable exists and check size budget (< 80 MB)
      - name: Verify portable executable size budget
        run: |
          EXE=$(find publish/linux-x64 -maxdepth 1 -name "Steergen.Cli" -o -name "steergen" | head -1)
          if [ -z "$EXE" ]; then
            EXE=$(find publish/linux-x64 -maxdepth 1 -type f -not -name "*.pdb" | head -1)
          fi
          if [ -z "$EXE" ]; then
            echo "ERROR: No executable found in publish/linux-x64"
            ls -lh publish/linux-x64/
            exit 1
          fi
          SIZE_BYTES=$(stat -c %s "$EXE")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "Executable: $EXE  Size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          # Budget: single portable executable must remain under 80 MB (docs/release/release-checklist.md)
          MAX_BYTES=$((80 * 1024 * 1024))
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "ERROR: Executable exceeds 80 MB size budget (${SIZE_MB} MB > 80 MB)"
            exit 1
          fi
          echo "Size budget check PASSED: ${SIZE_MB} MB <= 80 MB"

